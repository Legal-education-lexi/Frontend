<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e9" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Lexio — пространство юридического обучения" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Lexio — юридическое обучение</title>
    <script>
      (() => {
        const key = 'lexio-theme'
        let preference = 'system'
        try {
          const saved = localStorage.getItem(key)
          if (saved === 'light' || saved === 'dark' || saved === 'system') preference = saved
        } catch {}
        const systemTheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        const theme = preference === 'system' ? systemTheme : preference
        document.documentElement.dataset.theme = theme
        document.documentElement.dataset.themePreference = preference
        document.documentElement.style.colorScheme = theme
        document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#0b141c' : '#f3f0e9'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
